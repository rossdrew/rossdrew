<svg width="100%" height="180" viewBox="0 0 1500 180" xmlns="http://www.w3.org/2000/svg">
  <style><![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    .pixel-font {
      font-family: 'Press Start 2P', 'Courier New', monospace;
      text-rendering: optimizeSpeed;
      shape-rendering: crispEdges;
    }

    @keyframes fadeIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    .fade-title { animation: fadeIn 1.2s steps(6) forwards; }
    .fade-sub   { animation: fadeIn 1.2s steps(6) 0.6s forwards; opacity: 0; }

    @keyframes blink {
      0%, 49%   { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .cursor { animation: blink 1s steps(1) infinite; }

    /* Ball: constant-velocity zig-zag rally, linear = physical motion */
    @keyframes ballMove {
      0%    { transform: translate(40px, 60px); }
      12.5% { transform: translate(405px, 140px); }
      25%   { transform: translate(770px, 60px); }
      37.5% { transform: translate(1135px, 140px); }
      50%   { transform: translate(1460px, 90px); }
      62.5% { transform: translate(1135px, 60px); }
      75%   { transform: translate(770px, 140px); }
      87.5% { transform: translate(405px, 60px); }
      100%  { transform: translate(40px, 60px); }
    }
    #ball { animation: ballMove 4s linear infinite; }

    /* Paddles: chunky stepped movement for a "digital AI" feel */
    @keyframes paddle1Move {
      0%   { transform: translateY(45px); }
      20%  { transform: translateY(95px); }
      50%  { transform: translateY(75px); }
      80%  { transform: translateY(95px); }
      100% { transform: translateY(45px); }
    }
    @keyframes paddle2Move {
      0%   { transform: translateY(60px); }
      25%  { transform: translateY(90px); }
      50%  { transform: translateY(75px); }
      75%  { transform: translateY(50px); }
      100% { transform: translateY(60px); }
    }
    #paddle1 { animation: paddle1Move 4s steps(5) infinite; }
    #paddle2 { animation: paddle2Move 4s steps(5) infinite; }
  ]]></style>

  <!-- classic pong center divider, subtle dashed line -->
  <g opacity="0.35">
    <rect x="747" y="42" width="6" height="10" fill="#FFFFFF"/>
    <rect x="747" y="62" width="6" height="10" fill="#FFFFFF"/>
    <rect x="747" y="82" width="6" height="10" fill="#FFFFFF"/>
    <rect x="747" y="102" width="6" height="10" fill="#FFFFFF"/>
    <rect x="747" y="122" width="6" height="10" fill="#FFFFFF"/>
  </g>

  <!-- left paddle -->
  <rect id="paddle1" x="14" y="0" width="8" height="30" fill="#7E3D1F"/>

  <!-- right paddle -->
  <rect id="paddle2" x="1478" y="0" width="8" height="30" fill="#7E3D1F"/>

  <!-- ball -->
  <rect id="ball" x="-5" y="-5" width="10" height="10" fill="#FFFFFF"/>

  <!-- title text, white with dark-orange retro shadow -->
  <text class="pixel-font fade-title" x="368" y="48" font-size="34" fill="#5C2C14">ROSS DREW</text>
  <text class="pixel-font fade-title" x="365" y="45" font-size="34" fill="#FFFFFF">ROSS DREW</text>

  <!-- subtitle -->
  <text class="pixel-font fade-sub" x="393" y="158" font-size="14" fill="#5C2C14">AI ENGINEER | CODER | TINKERER<tspan class="cursor">_</tspan></text>
  <text class="pixel-font fade-sub" x="390" y="155" font-size="14" fill="#FFFFFF">AI ENGINEER | CODER | TINKERER<tspan class="cursor">_</tspan></text>
</svg>
